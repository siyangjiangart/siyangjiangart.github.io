<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI/UX Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 重置所有默认样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 整体页面样式 */
        body {
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
            color: #000000;
        }

        /* 覆盖原有的深色背景 */
        header, main, footer, section {
            background-color: #ffffff !important;
        }

        #videoWorks {
            padding: 30px 20px;
            background-color: #ffffff;
            max-width: 1200px;
            margin: 0 auto;
        }

        #videoWorks h2 {
            color: #000000;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 30px;
        }

        .video-item {
            max-width: 1000px;
            margin: 0 auto;
        }

        .video-item video {
            width: 100%;
            height: auto;
        }

        .video-item h4 {
            color: #000000;
            font-size: 1.3rem;
            font-weight: 500;
            margin: 25px 0 15px;
        }

        .video-item p {
            color: #333333;
            font-size: 1rem;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto 30px;
        }

        .project-overview {
            padding: 30px 20px;
            max-width: 1000px;
            margin: 0 auto;
            background-color: #ffffff;
        }

        .project-overview h2 {
            color: #000000;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .overview-content {
            display: flex;
            flex-direction: column;
            gap: 20px;  /* 基础间距 */
        }

        .overview-content .spacing {
            height: 20px;  /* 额外的间距 */
        }

        .overview-content p {
            color: #333333;
            font-size: 1rem;
            line-height: 1.6;
            padding-left: 20px;
            position: relative;
            max-width: 900px;  /* 控制文本宽度 */
        }

        .overview-content p::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #000000;
        }

        /* 导航栏样式 */
        nav {
            background-color: #ffffff !important;
        }

        nav a {
            color: #000000 !important;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            #videoWorks h2 {
                font-size: 1.5rem;
            }

            .video-item h4 {
                font-size: 1.2rem;
            }

            .video-item p,
            .overview-content p {
                font-size: 0.95rem;
            }

            .project-overview h2 {
                font-size: 1.3rem;
            }
        }

        .overview-image {
            margin-top: 40px;
            width: 100%;
            text-align: center;
        }

        .project-image {
            max-width: 100%;
            height: auto;
            display: inline-block;
        }

        .project-overview h3 {
            color: #000000;
            font-size: 1.3rem;
            font-weight: 600;
            margin: 30px 0 20px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <!-- 导航栏内容 -->
        </nav>
    </header>

    <main>
        <section id="videoWorks">
            <div class="video-item">
                <video controls autoplay loop muted playsinline>
                    <source src="videos/video15.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <div class="overview-image">
                <img src="images/image6.jpeg" alt="Project Image" class="project-image">
            </div>

            <div class="overview-image">
                <img src="images/image12.png" alt="Storyboard" class="project-image">
            </div>

            <div class="overview-image">
                <img src="images/image9.png" alt="Sitemap" class="project-image">
            </div>

            <div class="overview-image">
                <img src="images/image10.png" alt="Logo Design" class="project-image">
            </div>

            <div class="overview-image">
                <img src="images/image11.png" alt="Icon Design" class="project-image">
            </div>

            <div class="overview-image">
                <img src="images/image8.png" alt="Mockups" class="project-image">
            </div>

            <div class="overview-image">
                <img src="images/image7.png" alt="Goal Metrics" class="project-image">
            </div>
        </section>
    </main>

    <footer>
        <!-- 页脚内容 -->
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
